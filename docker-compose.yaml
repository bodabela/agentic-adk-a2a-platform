services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_AGENTS_DIR=/agents
      - APP_ROOT_AGENTS_DIR=/root_agents
      - APP_FLOWS_DIR=/flows
    volumes:
      - ./agents:/agents:ro
      - ./root_agents:/root_agents:ro
      - ./flows:/flows:ro
      - ./config:/config:ro
      - ./workspace:/workspace
    networks:
      - agent-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
