services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_DEBUG=true
      - APP_AGENTS_DIR=/agents
      - APP_ROOT_AGENTS_DIR=/root_agents
      - APP_FLOWS_DIR=/flows
      - APP_LLM_CONFIG_PATH=/config/llm_providers.yaml
      - APP_CHANNELS_CONFIG_PATH=/config/channels.yaml
      - APP_WORKSPACE_DIR=/workspace
      - APP_ADK_SESSIONS_DB=/data/adk/sessions.db
      - APP_CORS_ORIGINS=["http://localhost:5173"]
    volumes:
      - ./agents:/agents:ro
      - ./root_agents:/root_agents:ro
      - ./flows:/flows:ro
      - ./config:/config:ro
      - ./workspace:/workspace
      - adk-data:/data/adk
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - agent-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agent-net

volumes:
  adk-data:

networks:
  agent-net:
    driver: bridge
