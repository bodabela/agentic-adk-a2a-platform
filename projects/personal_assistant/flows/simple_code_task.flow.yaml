flow:
  name: "simple_code_task"
  version: "1.0.0"
  description: "Simple flow: user submits a coding task, coder_agent handles it"

  trigger:
    type: "manual"
    input_schema:
      type: "object"
      required: ["task_description"]
      properties:
        task_description:
          type: "string"

  config:
    max_retry_loops: 3
    timeout_minutes: 30
    provider: "google"
    model: "gemini-3.1-pro-preview"

  states:
    generate_code:
      type: "agent_task"
      agent: "dev_agent"
      description: "Generate code from the task description (or ask clarifying questions)"
      retry_loop: "generate_revise"
      input:
        requirement: "{{ trigger.task_description }}"
        user_feedback: "{{ states.ask_user_input.output.response | default('') }}"
        user_feedback_questions: "{{ states.ask_user_input.output.questions | default('') }}"
      output: [source_files, summary, agent_questions]
      on_complete: "review_result"
      on_error: "handle_error"

    review_result:
      type: "llm_decision"
      context:
        - "{{ states.generate_code.output }}"
      decision_prompt: |
        Review the agent's output. The output may contain generated code, or it may contain
        questions the agent wants to ask the user (in the "agent_questions" field).

        Decision rules:
        - If "agent_questions" is present and non-empty -> ask_user
          Copy the agent_questions array into your "questions" field as-is.
        - If the code looks complete and correct -> accept
        - If it needs improvement -> revise

        When choosing ask_user, you MUST include the "questions" array from agent_questions.
      transitions:
        accept: "complete_success"
        revise: "generate_code"
        ask_user: "ask_user_input"

    ask_user_input:
      type: "human_interaction"
      interaction_type: "multi_question"
      prompt: "{{ states.review_result.output.reason | default('The agent has questions about the task.') }}"
      questions: "{{ states.review_result.output.questions | default('') }}"
      on_response: "generate_code"

    handle_error:
      type: "terminal"
      status: "failed"
      output:
        error: "{{ error }}"

    complete_success:
      type: "terminal"
      status: "success"
      output:
        result: "{{ states.generate_code.output }}"
        cost: "{{ flow.cost_report }}"
