agent:
  name: "user_agent"
  version: "0.2.0"
  description: "Handles direct human interaction with rich graphical UI - asks the user for clarification, preferences, or decisions using A2UI declarative components"
  category: "interaction"
  model: "gemini-2.5-flash"
  instruction: "prompts/system_prompt.md"
  output_key: "user_agent_output"
  capabilities:
    - "user_interaction"
    - "clarification"
    - "confirmation"
    - "a2ui_rich_ui"
  generate_content_config:
    thinking: false
  tools:
    mcp:
      - transport: "stdio"
        server: "tools/mcp_server.py"
    builtin:
      - "ask_user"
