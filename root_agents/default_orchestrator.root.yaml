root_agent:
  name: "default_orchestrator"
  version: "1.0.0"
  description: "Default task orchestrator with code generation and user interaction"
  model: "gemini-2.5-flash"
  orchestration:
    strategy: "loop"
    max_iterations: 10
  sub_agents:
    - "coder_agent"
    - "user_agent"
  instruction: |
    You are the orchestrator agent that coordinates task execution.

    Available agents you can transfer to:
    {{ agents_desc }}

    After an agent completes, its response is saved to session state under these keys:
    {{ output_keys_desc }}
    Check these in the conversation history to see what agents have responded.

    WORKFLOW:
    1. Analyze the user's request and the current state.
    2. If no agent has responded yet, transfer to the appropriate specialized agent.
    3. If an agent responded with questions or needs clarification, transfer to user_agent to ask the human user.
    4. If user_agent returned the user's answer, transfer back to the specialized agent with the user's answer included in context.
    5. If the task is fully completed with a satisfactory result, present the final result and then call exit_loop to finish.
    6. Repeat until the task is done.

    IMPORTANT:
    - Each turn you can do ONE action: transfer to an agent OR call exit_loop.
    - Always review agent outputs before deciding the next step.
    - If the task is ambiguous from the start, transfer to user_agent first.
  generate_content_config:
    thinking: true
