module:
  name: "coder_agent"
  version: "0.1.0"
  description: "Code generation and modification agent"
  category: "development"

agent:
  enabled: true
  model: "gemini-3.1-pro-preview"
  model_fallback: "gemini-2.5-flash"
  max_tokens: 8192
  mode: "on_demand"
  capabilities:
    - "code_generation"
    - "code_modification"
    - "hotfix_creation"
  supported_modalities:
    input: ["text", "application/json"]
    output: ["text", "application/json"]
  human_interaction:
    enabled: true
    interaction_types:
      - "confirmation"
      - "selection"
      - "free_text"

a2a:
  host: "127.0.0.1"
  port: 8001

tools:
  mcp:
    transport: "stdio"           # "stdio" = child process, "sse" = remote HTTP
    server: "tools/mcp_server.py"  # stdio: script path relative to module dir
    # url: "http://localhost:8010/sse"  # sse: uncomment when running MCP server separately
    tools:
      - name: "list_workspace_files"
        description: "List all files in the workspace"
      - name: "read_code_file"
        description: "Read a code file's contents from the workspace"
      - name: "write_code_file"
        description: "Write content to a code file in the workspace"

cost_tracking:
  enabled: true
  budget_alert_threshold_usd: 10.0
